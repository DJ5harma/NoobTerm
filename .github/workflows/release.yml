name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
            artifact-name: 'linux-amd64'
          - platform: 'windows/amd64'
            os: 'windows-latest'
            artifact-name: 'windows-amd64'
          - platform: 'darwin/universal'
            os: 'macos-latest'
            artifact-name: 'darwin-universal'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wails App
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: NoobTerm
          build-platform: ${{ matrix.platform }}
          go-version: '1.23.0'
          node-version: '20'
          package: false
          # For Windows, we want the NSIS installer
          nsis: ${{ matrix.platform == 'windows/amd64' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoobTerm-${{ matrix.artifact-name }}
          path: |
            build/bin/*
            build/windows/installer/*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Release Files
        run: |
          mkdir ./release
          # Linux
          cp ./artifacts/NoobTerm-linux-amd64/NoobTerm ./release/NoobTerm-linux || true
          # Windows - look for both standalone and installer
          find ./artifacts/NoobTerm-windows-amd64 -name "*.exe" -exec cp {} ./release/ \;
          # macOS
          find ./artifacts/NoobTerm-darwin-universal -name "*.dmg" -exec cp {} ./release/ \;
          find ./artifacts/NoobTerm-darwin-universal -name "*.app" -exec cp {} ./release/ \;
          
          # Fallback: if names are generic, ensure they are unique
          cd ./release
          for f in *; do
            if [ "$f" == "NoobTerm.exe" ]; then mv "$f" "NoobTerm-windows.exe"; fi
            if [ "$f" == "NoobTerm-amd64-installer.exe" ]; then mv "$f" "NoobTerm-Installer.exe"; fi
          done
          ls -R .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Latest Build' || github.ref_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          files: ./release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
