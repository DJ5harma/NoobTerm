name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
            artifact-name: 'linux-amd64'
          - platform: 'windows/amd64'
            os: 'windows-latest'
            artifact-name: 'windows-amd64'
          - platform: 'darwin/universal'
            os: 'macos-latest'
            artifact-name: 'darwin-universal'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wails App
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: NoobTerm
          build-platform: ${{ matrix.platform }}
          go-version: '1.23.0'
          node-version: '20'
          package: false
          # For Windows, we want the NSIS installer
          nsis: ${{ matrix.platform == 'windows/amd64' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoobTerm-${{ matrix.artifact-name }}
          path: |
            build/bin/*
            build/windows/installer/*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Release Files
        run: |
          mkdir -p ./release
          echo "Dumping artifact structure for debugging:"
          ls -R ./artifacts
          
          # Use a very aggressive find-and-copy approach
          # Prefix files with platform name to prevent overwriting
          
          # Linux
          find ./artifacts/NoobTerm-linux-amd64 -type f -not -name "*.json" -exec cp -v {} ./release/NoobTerm-Linux \; || true
          
          # Windows
          find ./artifacts/NoobTerm-windows-amd64 -name "*.exe" -exec cp -v {} ./release/ \; || true
          
          # macOS
          find ./artifacts/NoobTerm-darwin-universal -type f -not -name "*.json" -exec cp -v {} ./release/NoobTerm-macOS-Binary \; || true
          
          # Ensure Windows files are named uniquely
          cd ./release
          if [ -f "NoobTerm.exe" ]; then mv -v "NoobTerm.exe" "NoobTerm-Windows-Standalone.exe"; fi
          if [ -f "NoobTerm-amd64-installer.exe" ]; then mv -v "NoobTerm-amd64-installer.exe" "NoobTerm-Windows-Installer.exe"; fi
          
          echo "Final files in release folder:"
          ls -lh .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Latest Build' || github.ref_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          files: ./release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
