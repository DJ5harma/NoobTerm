name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
            artifact-name: 'linux'
          - platform: 'windows/amd64'
            os: 'windows-latest'
            artifact-name: 'windows'
          - platform: 'darwin/universal'
            os: 'macos-latest'
            artifact-name: 'macos'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wails App
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: NoobTerm
          build-platform: ${{ matrix.platform }}
          go-version: '1.23.0'
          node-version: '20'
          package: false
          # For Windows, we want the NSIS installer
          nsis: ${{ matrix.platform == 'windows/amd64' }}

      # Prepare artifacts with proper naming and compression
      - name: Package Artifacts (Windows)
        if: matrix.platform == 'windows/amd64'
        shell: pwsh
        run: |
          mkdir release-stage
          cp build/bin/*.exe release-stage/
          ls release-stage

      - name: Package Artifacts (Linux)
        if: matrix.platform == 'linux/amd64'
        run: |
          mkdir release-stage
          cp build/bin/NoobTerm release-stage/NoobTerm-linux
          chmod +x release-stage/NoobTerm-linux
          ls release-stage

      - name: Package Artifacts (macOS)
        if: matrix.platform == 'darwin/universal'
        run: |
          mkdir release-stage
          # macOS .app is a directory, must be zipped for release
          cd build/bin
          zip -r ../../release-stage/NoobTerm-macOS.zip NoobTerm.app
          cd ../..
          ls release-stage

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoobTerm-binaries-${{ matrix.artifact-name }}
          path: release-stage/*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Release Files
        run: |
          mkdir ./release-final
          # Find all files in all downloaded artifact folders and move to a flat folder
          find ./artifacts -type f -exec cp -v {} ./release-final/ \;
          echo "Release folder contents:"
          ls -lh ./release-final

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Latest Build' || github.ref_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          files: ./release-final/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
