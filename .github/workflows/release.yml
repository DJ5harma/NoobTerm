name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    name: Build - ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'linux/amd64'
            os: 'ubuntu-latest'
          - platform: 'windows/amd64'
            os: 'windows-latest'
          - platform: 'darwin/universal'
            os: 'macos-latest'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Wails App
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-name: NoobTerm
          build-platform: ${{ matrix.platform }}
          go-version: '1.23.0'
          node-version: '20'
          package: false
          # For Windows, we want the NSIS installer
          nsis: ${{ matrix.platform == 'windows/amd64' }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoobTerm-${{ matrix.platform }}
          path: |
            build/bin/*
            build/windows/installer/*.exe

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Prepare Release Files
        run: |
          mkdir ./release
          find ./artifacts -type f \( -name "*.exe" -o -name "*.deb" -o -name "*.app" -o -name "*.dmg" -o -name "NoobTerm" \) -exec cp {} ./release/ \;
          ls -R ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref == 'refs/heads/main' && 'latest' || github.ref_name }}
          name: ${{ github.ref == 'refs/heads/main' && 'Latest Build' || github.ref_name }}
          draft: false
          prerelease: ${{ github.ref == 'refs/heads/main' }}
          files: ./release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
