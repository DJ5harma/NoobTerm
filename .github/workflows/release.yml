name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0). If empty, "latest" will be used.'
        required: false
        default: 'latest'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact-name: NoobTerm-Windows
          - os: ubuntu-latest
            platform: linux/amd64
            artifact-name: NoobTerm-Linux
          - os: macos-latest
            platform: darwin/universal
            artifact-name: NoobTerm-macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Active LTS as of 2026
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev build-essential pkg-config

      - name: Build Wails App (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64 -clean -nsis

      - name: Build Wails App (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform linux/amd64 -clean -tags webkit2_41

      - name: Build Wails App (macOS)
        if: runner.os == 'macOS'
        run: wails build -platform darwin/universal -clean

      - name: Prepare Artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir release
          # Copies both the standalone NoobTerm.exe and the NSIS installer NoobTerm-amd64-installer.exe
          Copy-Item build\bin\*.exe release\

      - name: Prepare Artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir release
          mv build/bin/NoobTerm release/NoobTerm-linux-amd64
          chmod +x release/NoobTerm-linux-amd64
          # Standard practice is to distribute linux binaries in a tarball
          tar -czvf release/NoobTerm-Linux-amd64.tar.gz -C release NoobTerm-linux-amd64
          rm release/NoobTerm-linux-amd64

      - name: Prepare Artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir release
          cd build/bin
          # macOS applications must be zipped to preserve internal permissions and structure
          zip -r ../../release/NoobTerm-macOS-universal.zip NoobTerm.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: release/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
